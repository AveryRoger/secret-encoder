<!DOCTYPE html>
<html>
<head>
  <title>Secret Encoder</title>
</head>
<body>
  <h1>Secret Encoder 🔐</h1>

  <h2>Encode</h2>
  <input id="encodeInput" placeholder="Enter message">
  <button onclick="encode()">Encode</button>

  <p id="encodedOutput"></p>
  <button onclick="copyEncoded()">Copy Encoded</button>

  <p id="keyOutput"></p>
  <button onclick="copyKey()">Copy Key</button>

  <h2>Decode</h2>
  <input id="encodedInput" placeholder="Encoded array">
  <input id="keyInput" placeholder="Key array">
  <button onclick="decode()">Decode</button>

  <p id="decodedOutput"></p>

  <script>
    let lastEncoded = "";
    let lastKey = "";

    function encode() {
      let text = document.getElementById("encodeInput").value;
      let encoded = [];
      let key = [];

      for (let i = 0; i < text.length; i++) {
        let r = Math.floor(Math.random() * 10000) + 1;
        key.push(r);
        encoded.push(text.charCodeAt(i) * r);
      }

      lastEncoded = JSON.stringify(encoded);
      lastKey = JSON.stringify(key);

      document.getElementById("encodedOutput").innerText = "Encoded: " + lastEncoded;
      document.getElementById("keyOutput").innerText = "Key: " + lastKey;
    }

    function copyEncoded() {
      navigator.clipboard.writeText(lastEncoded);
      alert("Encoded copied!");
    }

    function copyKey() {
      navigator.clipboard.writeText(lastKey);
      alert("Key copied!");
    }

    function decode() {
      let encoded = JSON.parse(document.getElementById("encodedInput").value);
      let key = JSON.parse(document.getElementById("keyInput").value);

      let decoded = "";

      for (let i = 0; i < encoded.length; i++) {
        decoded += String.fromCharCode(Math.floor(encoded[i] / key[i]));
      }

      document.getElementById("decodedOutput").innerText = "Decoded: " + decoded;
    }
  </script>
</body>
</html>
